name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infrastructure/terraform/

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r orchestration/airflow/requirements.txt

      - name: Lint DAGs
        run: |
          python -m py_compile orchestration/airflow/dags/*.py

  terraform-plan:
    name: Terraform Plan (reference only)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: |
          cd infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}
          terraform init

      - name: Terraform Plan
        run: |
          cd infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}
          terraform plan
        # terraform apply é intencionalmente omitido.
        # Este pipeline serve apenas como referência da infraestrutura Azure.
        # Nenhum recurso é criado ou cobrado.
