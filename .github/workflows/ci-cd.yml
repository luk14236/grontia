name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ASTRONOMER_API_TOKEN: ${{ secrets.ASTRONOMER_API_TOKEN }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infrastructure/terraform/

      - name: Terraform Validate
        run: |
          cd infrastructure/terraform/
          terraform init -backend=false
          terraform validate

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r orchestration/airflow/requirements.txt

      - name: Lint DAGs
        run: |
          python -m py_compile orchestration/airflow/dags/*.py

  build-airflow:
    name: Build Airflow Image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/grondia-airflow
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./orchestration/airflow
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-airflow
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ env.AZURE_CLIENT_ID }}","clientSecret":"${{ env.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ env.AZURE_TENANT_ID }}"}'

      - name: Terraform Init
        run: |
          cd infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}
          terraform init

      - name: Terraform Plan
        run: |
          cd infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd infrastructure/terraform/envs/${{ github.event.inputs.environment || 'dev' }}
          terraform apply tfplan

  deploy-dags:
    name: Deploy DAGs to Astronomer
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Astronomer CLI
        run: |
          curl -sSL https://install.astronomer.io | sudo bash -s -- v1
          astro version

      - name: Authenticate with Astronomer
        run: |
          astro login --token ${{ env.ASTRONOMER_API_TOKEN }}

      - name: Deploy DAGs
        run: |
          cd orchestration/airflow
          astro deploy ${{ secrets.ASTRONOMER_DEPLOYMENT_ID }}

  deploy-dbt:
    name: Deploy dbt to Databricks
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-databricks

      - name: Deploy dbt models
        run: |
          cd analytics/dbt
          dbt deps
          dbt run --target ${{ github.event.inputs.environment || 'dev' }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}

  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    needs: [deploy-dags, deploy-dbt]
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "Deployment failed. Check logs above for details."