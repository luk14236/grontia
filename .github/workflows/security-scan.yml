name: Security Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit (Python security linter)
        run: |
          bandit -r orchestration/airflow/dags/ processing/ analytics/dbt/ --exclude tests -ll --exit-zero
        # -ll: reporta apenas severidade MEDIUM e acima (ignora LOW)
        # --exit-zero: nunca falha o pipeline por issues de segurança (apenas informa)

      - name: Run Safety (dependency vulnerability check)
        run: |
          safety check --file orchestration/airflow/requirements.txt
        continue-on-error: true

      - name: Scan Terraform for security issues
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'config'
          scan-ref: 'infrastructure/terraform'
          format: 'table'
